        body { background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292e; padding: 40px 0; }

<body>
    <a href="../index.html" class="btn btn-dark btn-home">🏠 回首頁</a>
    <div class="container">
        <article id="content" class="markdown-body"></article>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script>
        const rawMd = `# ITS Database (MTA 98-364) 技術題庫與維護手冊 (V3.5)\n\n本文件根據 \`www/ITS_Database/questions_ITS_Database.json\` 題庫內容 (共 105 題) 進行深度分析，並整合核心技術對照表與維護規範。\n\n---\n\n## 一、 題庫規模與組成 (2026-03-02 更新)\n*   **總題數**：105 題\n*   **官方核心版本 (1-69)**：69 題 (真正流出考點，務必優先掌握)\n*   **補充/模擬版本 (70-105)**：36 題 (用於強化觀念)\n\n## 二、 考點分佈與出題權重評估\n\n| 類別 | 母體題數 | 佔比 | 建議考題數 | 強度評估 |\n| :--- | :---: | :---: | :---: | :--- |\n| D1 資料庫概念 | 11 | 10.5% | 4 | 🟢 適中 |\n| D2 資料庫設計 | 28 | 26.7% | 11 | 🔴 高強度 |\n| D3 資料操作 (SQL) | 32 | 30.5% | 12 | 🔴 高強度 |\n| D4 安全性與維護 | 24 | 22.9% | 9 | 🔴 高強度 |\n| D5 資料庫維護(正規化) | 10 | 9.5% | 4 | 🟢 適中 |\n\n---\n\n## 三、 資料庫基礎理論 (Core Theory)\n\n### 1. 資料庫常規化 (Normalization)\n- **第一常規化 (1NF)**：欄位原子性。確保每個欄位只包含單一值。\n- **第二常規化 (2NF)**：完全函數相依。符合 1NF，消除部分相依。\n- **第三常規化 (3NF)**：消除遞移相依。符合 2NF，消除非主鍵欄位相依。\n\n### 2. 交易 ACID 原則\n- **原子性 (Atomicity)**：操作全做或全不做。\n- **一致性 (Consistency)**：符合所有完整性限制。\n- **隔離性 (Isolation)**：並發交易互不干擾。\n- **持續性 (Durability)**：一旦 Commit 永久存儲。\n\n---\n\n## 四、 SQL 指令進階分類與語法細節\n\n### 1. DDL vs DML\n| 指令類別 | 常用關鍵字 | 主要用途 |\n| :--- | :--- | :--- |\n| **DDL** | CREATE, ALTER, DROP, TRUNCATE | 定義、修改及刪除結構。 |\n| **DML** | SELECT, INSERT, UPDATE, DELETE | 處理資料列內容。 |\n| **TCL** | COMMIT, ROLLBACK | 控制交易事務。 |\n\n### 2. 查詢執行邏輯\n1. **FROM** -> 2. **WHERE** -> 3. **GROUP BY** -> 4. **HAVING** -> 5. **SELECT** -> 6. **ORDER BY**\n\n---\n\n## 五、 關鍵機制與陷阱\n\n### 🧩 刪除規則與機制\n- **串聯刪除 (Cascade Delete)**：主鍵刪除時自動連帶刪除關聯外鍵資料。\n- **外部索引鍵 (Foreign Key)**：確保參考完整性的核心物件。\n\n### 🔗 集合運算子 (Set Operators)\n- **UNION**：聯集，自動去重。\n- **UNION ALL**：聯集，保留重複項目。\n- **INTERSECT**：交集，僅傳回重疊部分。\n\n---\n\n## 六、 系統維護規範\n\n### 1. UI 佈局規範\n- **容器寬度**：\`style=\"width: calc(100% - 60px); margin: 20px auto; max-width: none;\"\`。\n- **去粉紅規則**：區塊代碼背景必須透明。\n\n### 2. 維護指令清單\n- **同步 JS 邏輯**：\`python .\\\\final_js_sync.py\`\n- **修復佈局**：\`python .\\\\final_clean_repair.py\`\n\n---\n*最後更新日期：2026年3月2日*`;

        document.getElementById('content').innerHTML = marked.parse(rawMd);
        document.querySelectorAll('table').forEach(table => table.classList.add('table', 'table-bordered', 'table-hover'));
        Prism.highlightAll();
    </script>
