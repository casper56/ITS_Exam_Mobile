name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 只上傳網頁相關檔案，排除開發腳本和備份檔
          path: "."
          # 排除模式 (Exclude unnecessary files)
          # GitHub Pages artifact upload handles this via include/exclude if specified
          # Note: By default upload-pages-artifact uploads everything in the path.
          # To keep it clean, we'll use a temp directory or rely on the fact that Pages doesn't serve hidden files well.

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
